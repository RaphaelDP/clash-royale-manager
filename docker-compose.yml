version: "3.8"

services:
  app: 
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"  # Streamlit
      - "8000:8000"  # FastAPI
    environment:
      - PYTHONPATH=/app
      - CR_API_TOKEN=${CR_API_TOKEN}
      - CLAN_TAG=${CLAN_TAG}
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FILE=${LOG_FILE}
    volumes:
      - ./data:/app/data  # Persist database files
      - ./logs:/app/logs  # Persist logs
    restart: unless-stopped